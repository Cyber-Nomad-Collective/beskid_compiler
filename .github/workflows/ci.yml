name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

jobs:
  workspace-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s workspace_check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s test

  abi-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s abi_contracts

  bench-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s bench_compile

  e2e-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s e2e_linux

  runtime-asan-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s runtime_asan_linux

  extern-engine-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s extern_engine_security

  e2e-macos-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s e2e_macos_smoke

  e2e-windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s e2e_windows_smoke

  version:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - id: version
        run: python -m nox --non-interactive -s compute_version

  release-cli-build:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs:
      - version
      - workspace-check
      - test
      - abi-contracts
      - bench-compile
      - e2e-linux
      - runtime-asan-linux
      - extern-engine-security
      - e2e-macos-smoke
      - e2e-windows-smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: beskid-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: beskid-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: beskid-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ci/requirements.txt
      - name: Build CLI artifact
        env:
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_ASSET_NAME: ${{ matrix.asset_name }}
        run: python -m nox --non-interactive -s release_cli
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release-cli-publish:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs:
      - version
      - release-cli-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "beskid-*"
          merge-multiple: true
      - name: Write cli-version.txt for rolling release
        run: printf '%s\n' "${{ needs.version.outputs.version }}" > release-assets/cli-version.txt
      - name: Publish GitHub release (cli-latest)
        uses: softprops/action-gh-release@v2.3.3
        with:
          tag_name: cli-latest
          target_commitish: ${{ github.sha }}
          name: Beskid CLI (rolling)
          body: |
            Rolling CLI build.

            **Version string:** `${{ needs.version.outputs.version }}`
            **Commit:** `${{ github.sha }}`
          draft: false
          prerelease: false
          generate_release_notes: false
          make_latest: "false"
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/cli-version.txt
            release-assets/beskid-linux-amd64
            release-assets/beskid-darwin-arm64
            release-assets/beskid-windows-amd64.exe
