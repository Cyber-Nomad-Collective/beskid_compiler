name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:

jobs:
  workspace-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo check workspace
        run: cargo check --workspace

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Tests
        run: cargo test -p beskid_tests 

  version:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("crates/beskid_cli/Cargo.toml")
          content = path.read_text(encoding="utf-8")
          content, count = re.subn(
              r'(?m)^version\s*=\s*"[^"]+"\s*$',
              f'version = "{version}"',
              content,
              count=1,
          )
          if count != 1:
              raise RuntimeError("failed to update version in crates/beskid_cli/Cargo.toml")
          path.write_text(content, encoding="utf-8")
          PY

      - name: Bump patch version
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path("crates/beskid_cli/Cargo.toml")
          content = path.read_text(encoding="utf-8")
          match = re.search(r'(?m)^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"\s*$', content)
          if not match:
              raise RuntimeError("unable to parse semver in crates/beskid_cli/Cargo.toml")

          major, minor, patch = map(int, match.groups())
          next_version = f"{major}.{minor}.{patch + 1}"
          content = (
              content[: match.start()]
              + f'version = "{next_version}"'
              + content[match.end() :]
          )
          path.write_text(content, encoding="utf-8")
          PY

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 - <<'PY'
          import tomllib
          with open('crates/beskid_cli/Cargo.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['package']['version'])
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  release-cli:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: beskid-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: beskid-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: beskid-windows-amd64.exe
    env:
      SEAWEEDFS_ENDPOINT: https://cdn.beskid-lang.org
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Apply version
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("crates/beskid_cli/Cargo.toml")
          content = path.read_text(encoding="utf-8")
          content, count = re.subn(
              r'(?m)^version\s*=\s*"[^"]+"\s*$',
              f'version = "{version}"',
              content,
              count=1,
          )
          if count != 1:
              raise RuntimeError("failed to apply version in crates/beskid_cli/Cargo.toml")
          path.write_text(content, encoding="utf-8")
          PY

      - name: Build CLI
        run: cargo build -p beskid_cli --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv target/${{ matrix.target }}/release/beskid_cli.exe ${{ matrix.asset_name }}
          else
            mv target/${{ matrix.target }}/release/beskid_cli ${{ matrix.asset_name }}
          fi

      - name: Upload to SeaweedFS (versioned)
        uses: Noelware/s3-action@2
        with:
          access-key-id: ${{ secrets.SEAWEEDFS_ACCESS_KEY }}
          secret-key: ${{ secrets.SEAWEEDFS_SECRET_KEY }}
          endpoint: ${{ env.SEAWEEDFS_ENDPOINT }}
          region: us-east-1
          bucket: releases
          prefix: /releases/${{ needs.version.outputs.version }}
          files: |
            ${{ matrix.asset_name }}

      - name: Upload to SeaweedFS (latest)
        uses: Noelware/s3-action@2
        with:
          access-key-id: ${{ secrets.SEAWEEDFS_ACCESS_KEY }}
          secret-key: ${{ secrets.SEAWEEDFS_SECRET_KEY }}
          endpoint: ${{ env.SEAWEEDFS_ENDPOINT }}
          region: us-east-1
          bucket: releases
          prefix: /releases/latest
          files: |
            ${{ matrix.asset_name }}
